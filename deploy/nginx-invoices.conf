# Include upstream in http{} or duplicate name if you already have one:
upstream invoices_gunicorn {
    server 127.0.0.1:8001 fail_timeout=0;
}

# HTTP → HTTPS (after certbot, adjust ssl paths if needed)
server {
    listen 80;
    server_name invoices.rajatht.me;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name invoices.rajatht.me;

    ssl_certificate     /etc/letsencrypt/live/invoices.rajatht.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/invoices.rajatht.me/privkey.pem;

    client_max_body_size 25M;

    location /static/ {
        alias /var/www/invoice/staticfiles/;
    }
    location /media/ {
        alias /var/www/invoice/media/;
    }
    location / {
        proxy_pass http://invoices_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
